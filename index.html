<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 30px;
    }
    .login-title {
      text-align: center;
      font-size: 24px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 30px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #07c160;
    }
    .login-btn {
      width: 100%;
      height: 48px;
      background-color: #07c160;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 12px;
    }
    .login-btn:hover {
      background-color: #06ae56;
    }
    .register-btn {
      width: 100%;
      height: 48px;
      background-color: #f5f5f5;
      color: #576b95;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .register-btn:hover {
      background-color: #e8e8e8;
    }
    .message-container {
      width: 100%;
      max-width: 800px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 20px;
      display: none;
    }
    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 20px;
    }
    .message-header h2 {
      font-size: 20px;
      color: #1a1a1a;
    }
    .logout-btn {
      padding: 8px 16px;
      background-color: #ff4d4f;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .message-input {
      width: 100%;
      height: 100px;
      padding: 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      resize: none;
      margin-bottom: 12px;
    }
    .send-btn {
      width: 100%;
      height: 44px;
      background-color: #07c160;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .message-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .message-item {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .message-item .username {
      font-weight: 500;
      color: #07c160;
      margin-bottom: 4px;
    }
    .message-item .content {
      color: #333;
      line-height: 1.5;
    }
    .message-item .time {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="login-container" id="loginPage">
    <h1 class="login-title">登录</h1>
    <div class="input-group">
      <input type="text" id="username" placeholder="请输入账号" value="admin">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="请输入密码" value="md199717">
    </div>
    <button class="login-btn" id="loginBtn">登录</button>
    <button class="register-btn" id="registerBtn">去注册</button>
  </div>

  <div class="message-container" id="messagePage">
    <div class="message-header">
      <h2>留言板</h2>
      <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>
    <textarea class="message-input" id="messageInput" placeholder="写下你的留言..."></textarea>
    <button class="send-btn" id="sendBtn">发送留言</button>
    <div class="message-list" id="messageList"></div>
  </div>

  <script>
    // 🔴 核心：API地址写死3000端口，绝对不修改
    const API_BASE_URL = 'https://old-flies-clean.loca.lt';

    // DOM元素
    const loginPage = document.getElementById('loginPage');
    const messagePage = document.getElementById('messagePage');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messageList = document.getElementById('messageList');

    // 登录逻辑（完整可运行）
    loginBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!username || !password) {
        alert('请输入账号和密码');
        return;
      }

      try {
        // 强制请求3000端口后端
        const response = await fetch(`${API_BASE_URL}/api/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (data.success) {
          loginPage.style.display = 'none';
          messagePage.style.display = 'block';
          alert('登录成功！');
          loadMessages();
        } else {
          alert('登录失败：' + data.message);
        }
      } catch (err) {
        console.error('登录错误：', err);
        alert('登录失败：请检查后端服务是否启动在3000端口');
      }
    });

    // 退出登录
    logoutBtn.addEventListener('click', () => {
      messagePage.style.display = 'none';
      loginPage.style.display = 'block';
      usernameInput.value = 'admin';
      passwordInput.value = 'md199717';
    });

    // 发送留言
    sendBtn.addEventListener('click', () => {
      const content = messageInput.value.trim();
      if (!content) {
        alert('请输入留言内容');
        return;
      }
      const messageItem = document.createElement('div');
      messageItem.className = 'message-item';
      messageItem.innerHTML = `
        <div class="username">${usernameInput.value}</div>
        <div class="content">${content}</div>
        <div class="time">${new Date().toLocaleString()}</div>
      `;
      messageList.appendChild(messageItem);
      messageInput.value = '';
    });

    // 加载留言
    function loadMessages() {
      messageList.innerHTML = '';
      const demoMessages = [
        { username: 'admin', content: '欢迎使用留言板！', time: new Date().toLocaleString() }
      ];
      demoMessages.forEach(msg => {
        const messageItem = document.createElement('div');
        messageItem.className = 'message-item';
        messageItem.innerHTML = `
          <div class="username">${msg.username}</div>
          <div class="content">${msg.content}</div>
          <div class="time">${msg.time}</div>
        `;
        messageList.appendChild(messageItem);
      });
    }

    // 注册按钮
    document.getElementById('registerBtn').addEventListener('click', () => {
      alert('注册功能开发中...');
    });
  </script>
</body>
</html>
